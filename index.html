<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Футбол 98</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      touch-action: none; /* отключаем системные жесты, чтобы тапы шли в игру */
      font-family: "Courier New", monospace;
      -webkit-user-select: none; user-select: none;
    }
    #game { display: block; width: 100%; height: 100%; }

    /* «Жучок» телеканала в углу — как логотип канала в эфире 98-го */
    #bug {
      position: fixed; top: 12px; right: 16px;
      color: rgba(255, 255, 255, 0.75);
      font-weight: bold; font-size: 22px; letter-spacing: 2px;
      text-shadow: 0 0 6px rgba(120, 200, 255, 0.8), 2px 2px 0 rgba(0,0,0,0.5);
      pointer-events: none;
    }

    #goal-flash {
      position: fixed; top: 38%; left: 0; right: 0;
      text-align: center;
      color: #fff; font-weight: bold; font-size: 9vw; letter-spacing: 8px;
      text-shadow: 0 0 18px rgba(255,255,120,0.9), 3px 3px 0 #000;
      opacity: 0; pointer-events: none;
      transition: opacity 0.15s;
    }
    #goal-flash.show { opacity: 1; }

    #preset-btn {
      position: fixed; top: 12px; left: 16px;
      background: rgba(0,0,0,0.55); color: #eee;
      border: 1px solid rgba(255,255,255,0.4);
      font-family: inherit; font-size: 14px; letter-spacing: 1px;
      padding: 8px 14px; cursor: pointer;
    }
    #preset-btn:active { background: rgba(255,255,255,0.2); }

    #hint {
      position: fixed; bottom: 16px; left: 16px;
      color: rgba(255,255,255,0.65); font-size: 13px;
      pointer-events: none;
      text-shadow: 1px 1px 0 #000;
    }

    /* Виртуальный стик (появляется под пальцем на левой половине экрана) */
    #stick-base {
      position: fixed; width: 120px; height: 120px; display: none;
      border: 2px solid rgba(255,255,255,0.35); border-radius: 50%;
      background: rgba(0,0,0,0.2); pointer-events: none; z-index: 5;
    }
    #stick-knob {
      position: absolute; left: 34px; top: 34px; width: 48px; height: 48px;
      border-radius: 50%; background: rgba(255,255,255,0.45);
    }

    /* Тач-кнопки: видны только на устройствах с пальцем */
    .tbtn {
      position: fixed; width: 86px; height: 86px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.45); background: rgba(0,0,0,0.35);
      color: #fff; font-family: inherit; font-size: 15px; letter-spacing: 1px;
      display: none; align-items: center; justify-content: center;
      user-select: none; -webkit-user-select: none; z-index: 5;
    }
    .tbtn:active { background: rgba(255,255,255,0.25); }
    #btn-shoot { right: 22px; bottom: 118px; }
    #btn-pass  { right: 124px; bottom: 26px; }
    @media (pointer: coarse) { .tbtn { display: flex; } }

    /* Шкала замаха удара */
    #power {
      position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
      width: 180px; height: 10px; display: none;
      border: 1px solid rgba(255,255,255,0.5); background: rgba(0,0,0,0.5);
    }
    #power-fill { height: 100%; width: 0%; background: #e8d44d; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="bug">Ф·98</div>
  <div id="goal-flash">ГОЛ!</div>
  <button id="preset-btn">ТВ: Эфир-98</button>
  <div id="hint">Стрелки — бег · S — пас · W — на ход · A — навес · D — удар (держать)</div>
  <div id="stick-base"><div id="stick-knob"></div></div>
  <div id="btn-pass" class="tbtn">ПАС</div>
  <div id="btn-shoot" class="tbtn">УДАР</div>
  <div id="power"><div id="power-fill"></div></div>

  <script>
    // Ловушка ошибок: модульные скрипты падают молча, выводим сбой на экран
    window.addEventListener('error', (e) => {
      document.getElementById('hint').textContent =
        'ОШИБКА: ' + (e.message || 'загрузка ' + (e.target && e.target.src ? e.target.src : '?'));
    }, true);
    window.addEventListener('unhandledrejection', (e) => {
      document.getElementById('hint').textContent = 'ОШИБКА (promise): ' + e.reason;
    });
  </script>
  <script type="importmap">
    { "imports": { "three": "./vendor/three.module.js" } }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
